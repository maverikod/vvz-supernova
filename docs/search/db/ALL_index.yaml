  - устойчивость
  - спин
  - барионное
  - число
  - нелинейность
  - градиент
  summary: 'Электрон в теории ВБП — это дефект минимального ранга, который отличается
    от протона отсутствием трёхмерного объёма (трёхторового резонатора). У протона
    есть полноценный трёхторовый резонатор с обмоткой, а у электрона — только обмотка
    без трёхмерного резонатора. "Нулевой размер" электрона означает отсутствие внутреннего
    трёхмерного объёма, т.е. нет радиальных степеней свободы и внутренних мод, но
    электрон геометрически нулевой, а топологически и энергетически конечный.


    Электронная обмотка слишком узкая и высокая по частоте, чтобы удержать внутренний
    резонатор в устойчивом состоянии, поэтому электрон остаётся в чистом "обмоточном"
    состоянии. Заряд, масса и магнитный момент электрона возникают чисто из топологии
    обмотки: заряд — величина сдвига фазы между обмоткой и базовым ВБП, масса — энергия
    стационарного решения обмотки, магнитный момент — торсионный поток вдоль линии
    обмотки.


    Отношение масс протона и электрона (m_p/m_e ≈ 1836) объясняется тем, что протон
    — полноценный трёхмерный дефект с тремя торами и обмоткой, а электрон — только
    краевая обмотка. Это результат отношения энергий стационарных решений двух разных
    топологий. Одинаковый заряд не означает одинаковую по энергии обмотку — заряд
    является чисто топологическим индексом фазовой сшивки.


    Энергия электронной обмотки разлагается на поверхностную энергию тонкого слоя
    и кулоновский хвост. Функционал обмотки включает члены с (ΔΘ)² и |∇Θ|⁶, которые
    дают жёсткость и предотвращают схлопывание дефекта. Масса электрона равна минимуму
    полной энергии обмотки + хвоста в однопоточном топологическом классе (|Q|=1).


    Спин и магнитный момент электрона идут не от трёхмерного тора, а от топологии
    пространства мод (Берри-фаза и worldline SUSY). Электрон не имеет масштабируемых
    мод и не масштабируется в отличие от протона, являясь фундаментальным кирпичом
    всех переходных резонаторов.

    '
  start_line: 281925
  end_line: 284295
  ranges:
  - - 281925
    - 284295
