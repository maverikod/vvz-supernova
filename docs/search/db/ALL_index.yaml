    несущей и низкочастотной огибающей, которая формирует ячейки как домены баланса
    двух потоков (P_in, P_out). Вводится строгое определение квенча как локального
    срыва доменного режима, реакция соседних ячеек и роль границ как интерфейсов смены
    допустимых ветвей и мод. Показано, что передача возмущения описывается коэффициентами
    передачи на границах T_ℓ^{(j→j+1)}, откуда следуют ступенчатое ослабление и секторальность
    как производные двухпотоковой доменной структуры, без классического 1/r и экспоненциального
