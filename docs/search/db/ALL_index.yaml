  summary: "Полный алгоритм реконструкции структуры подложки ВБП (трёх торов и обмотки)\
    \ по наблюдаемой кривой круговых скоростей V(R) галактики. Основан на 3D-резонаторной\
    \ модели торов и обмотки, строго в логике ВБП без потенциалов и гравитационных\
    \ аналогий.\n\n**Основные компоненты:**\n\n1. **Четыре семейства 3D-мод:**\n \
    \  - C (Circular): круговая симметрия, скелет V(R)\n   - S (Spiral/Bar): спиральные\
    \ рукава и бары\n   - V (Vertical): толщина диска и гало\n   - R (Radial tail):\
    \ высокорадиальная рябь\n\n2. **Энергетический баланс резонатора:**\n   - E_tot\
    \ = E_C + E_S + E_V + E_R\n   - Связь с прозрачностью стенок резонатора\n   -\
    \ Оценка долей энергии по семействам через DCT-спектр\n\n3. **DCT-спектральный\
    \ анализ:**\n   - Разложение V(R) в дискретное косинусное преобразование\n   -\
    \ Низкие k (k≤3) → вклад E_C (~80-85%)\n   - Высокие k (k>3) → утечки в другие\
    \ семейства (~15-20%)\n\n4. **Алгоритм инверсии (от наблюдаемого к торам):**\n\
    \   - V(R) → DCT → {E_k} → оценка E_C/E_tot, E_tail/E_tot\n   - Морфология → оценки\
    \ E_S/E_tot, E_V/E_tot\n   - Построение 3D-резонатора, согласованного с долями\
    \ энергии\n   - Инверсия 3D-резонатора в подложку (торы + обмотка)\n\n5. **Прямые\
    \ и обратные операторы:**\n   - Прямой: E_{n m ℓ} → V(R), ρ_eff, Φ_eff\n   - Обратный:\
    \ ρ_class или V_class → E_{n m ℓ}\n   - Эквивалентность классических моделей (NFW,\
    \ Буркерт) и Θ-конфигураций\n\n6. **Классификация галактик:**\n   - Классы резонаторов\
    \ C₁-C₆ по морфологии\n   - Классы окружения M₁-M₄ (узел, филамент, стенка, пустота)\n\
    \   - Области допустимых параметров для каждого класса\n\n7. **Многоуровневая\
    \ структура:**\n   - Уровни от микро (s=0: протон) до макро (s=4: кластер)\n \
    \  - Межуровневые связи через масштабные параметры λ_s\n   - Глобальная вариационная\
    \ задача по всей лестнице масштабов\n\n8. **Математический аппарат:**\n   - Дискретизация\
    \ наблюдений и DCT\n   - Каталог мод резонатора с индексами (n,m,ℓ)\n   - Тестовый\
    \ набор E_{n m ℓ}(Θ) через параметризованные формы\n   - Оператор \"моды → радиальный\
    \ профиль\"\n   - Функционал невязки в спектральном пространстве\n   - Двухуровневая\
    \ оптимизация (Θ, p) с энергетическими ограничениями\n\nАлгоритм полностью избегает\
    \ использования масс, потенциалов и гравитационных понятий, работая исключительно\
    \ с модовой структурой резонатора и энергетическим балансом.\n"
  start_line: 277687
  end_line: 281924
  ranges:
