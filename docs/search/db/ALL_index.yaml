    — ансамбли. Формализация когерентности через параметры Q (добротность), ε (параметр
    фрактальной дефектности), κ (жёсткость). Доказывается строгая лемма о том, почему
    ячейка не может быть уровнем. Условие существования уровня: ε_L << 1 и τ_coh >>
    τ_ext. Масса уровня определяется как энергия стационарного решения без массовых
