  summary: 'У них волновая функция **антисимметрична** при перестановке двух одинаковых

    частиц: 2. Следствие: **принцип Паули** — в одном квантовом состоянии не может

    находиться более одной фермионной частицы. Это объясняет устойчивость материи:

    электроны не падают все в основное состояние, а заполняют уровни по одному.

