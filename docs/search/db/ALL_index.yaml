  summary: '# Глава. Связь 7D-фазовой теории с квантовой механикой В квантовой механике
    (КМ)

    волновая функция \ интерпретируется как вероятность. В 7D-модели она имеет

    физическое воплощение: это **хвост частицы** — реальная волновая зона фазового

    поля, отходящая от нелинейного ядра. * Когда электрон проходит через две щели,

    интерференцию даёт не «абстрактная вероятность», а суперпозиция двух волновых

    хвостов. * Коллапс волновой функции — это не мистический процесс, а потеря

    когерентности хвоста при контакте с ядром или внешней средой.

    '
  start_line: 7865
  end_line: 34701
  ranges:
  - - 7865
