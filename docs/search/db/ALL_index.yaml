    русле общей теории (без массовых членов; масса как энергия стационара;

    ядро–переход–хвост). Я опираюсь на уже принятую 7D-модель и лагранжиан только
    из

    производных, а также на схему барионного сектора (SU(3), топологическая защита)

    и виреальные условия баланса. &#x20; **Координаты.** Три тора , для каждого —

    тороидальные координаты с радиусами . Видимая 3D-геометрия — проекции вложения
    в

    7D фазовое пространство .&#x20;

