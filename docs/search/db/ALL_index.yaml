  summary: 'Материя не является фундаментальной «вещественной субстанцией». Её первооснова
    —

    **волновая подоснова**: распределённое фазовое поле, которое несёт информацию
    о

    состоянии системы. В отличие от классических представлений, где вещество

    трактуется как набор точечных частиц, здесь **элементарные частицы представляют

    собой фазовые рисунки на базовом поле**. То есть то, что мы называем «частицей»,

    есть когерентная структура, возникающая в результате нелинейной самоорганизации

    фазового поля.

    '
